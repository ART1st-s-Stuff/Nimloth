# WM 训练阶段配置（phase2）
# 说明：该文件主要控制 batch/优化器/训练模式/GT校准监督步数等参数。
# 如需命令行覆盖，可使用：
#   uv run ... pipeline.train.temporal_stride=4
lazy_encoding: true
# 分块模式：按 episode 分组编码，支持 encoder 与训练并行
lazy_episode_chunk: true
# 分块模式下，是否等待第一个 episode 编码完成后再启动训练
lazy_wait_first_episode: true
batch_size: 16
epochs: 4
lr: 0.0001
# DataLoader 读取样本的并行 worker 数
num_workers: 8
# 预编码 latent 时使用的并行 worker 数
encoder_num_workers: 8
# 预编码 latent 的批大小
encoder_batch_size: 128
# precompute_wm_latents 使用的 manifest split（对应 dataset.manifests.<split>）
precompute_split: train
# 训练设备（cuda/cpu）
device: cuda
# 两阶段训练入口：
# - stage1_wm_vision: 训练 WM + vision encoder
# - stage2_value_head: 预留占位（当前不执行）
stage: stage1_wm_vision
# 在线联合训练数据源：ai2thor 或 eb_nav
dataset_source: eb_nav
eb_nav:
  dataset_path: datasets/EB-Nav/eb-nav_dataset_single_step.json
  images_base_dir: datasets/EB-Nav
  reward_cache_path: datasets/EB-Nav/phase2_reward_cache.jsonl
# 训练模式：unsupervised、semi_supervised 或 fully_supervised
# fully_supervised: WM 直接使用真实动作训练，不使用 IDM 推断动作
training_mode: fully_supervised
# 每个样本的监督步数（K）：可填单个整数（固定 K）或区间[min, max]（初始化时采样一个固定 K）
# 例如 K=2 时，监督 z_{t+history_len} 与 z_{t+history_len+1}
temporal_stride: 4
# 半监督下 IDM loss 的加权系数
semi_supervised_weight: 1.0
# WM 重建损失加权系数
reconstruction_weight: 1.0
# 梯度裁剪上限（L2 norm）
grad_clip_norm: 5.0
# true 时 WM 分支不把梯度反传到 IDM（分离传播）
detach_idm_in_wm: false
# WM 学习率（null 时回退到 lr）
wm_lr: null
# IDM/mapper 学习率（null 时回退到 lr）
idm_lr: null
# 最大样本数（0 表示不限制，用于快速调试）
max_samples: 0
# 断点续训：填 checkpoint 路径，或 latest 自动选择 models/wm/joint_qwen 下最新 checkpoint
resume_from_checkpoint: ""
# 每 N step 保存训练断点（<=0 关闭周期保存）
save_every_steps: 500
# AdamW 权重衰减
weight_decay: 0.01
# 线性学习率 warmup 步数（0 表示关闭）
lr_warmup_steps: 1000
# Cosine Annealing 总步数（0 表示自动推断 = epochs * batches_per_epoch）
# warmup 完成后从 base_lr 沿余弦曲线下降到 min_lr_ratio * base_lr
cos_annealing_steps: 0
# Cosine Annealing 最小学习率比例（最终 lr = base_lr * ratio）
cos_min_lr_ratio: 0.1
# EMA（仅对 WM 主模型）
ema:
  enabled: true
  decay: 0.999
# step 级日志记录间隔（<=0 表示关闭；例如 10 表示每 10 step 记录一次）
log_every_n_steps: 10
# 训练后可视化：在 test split 上采样 rollout 生成轨迹图并上传 wandb
post_visualization_enabled: true
# 训练中每 N step 触发一次可视化并上传（<=0 关闭训练中触发）
post_visualization_every_n_steps: 10
post_visualization_rollouts: 3
post_visualization_steps: 50
# 是否额外可视化 LeWM 内部 encoder（SIGReg 前）空间轨迹
post_visualization_include_sigreg_encoder_space: true
# Qwen visual encoder 训练策略
qwen_encoder:
  # full: visual 全参数训练；lora: 仅训练 visual LoRA 参数
  train_mode: full
  lora:
    r: 8
    alpha: 16
    dropout: 0.05
    # 若为空，将自动探测 visual 模块常见线性层名
    target_modules: []
  kl:
    # teacher-student 的 vision token 级 KL
    enabled: false
    weight: 0.01
    temperature: 1.0
    # 每个 batch 最多抽取多少张图计算 KL，避免显存暴涨
    max_images_per_batch: 8
  ema:
    # 是否为 Qwen visual encoder 维护 EMA
    enabled: false
    decay: 0.999
    # 训练后可视化是否使用 visual EMA 权重
    use_ema_for_eval: true
# Phase 2 前置 planner LoRA adapter
qwen_planner_lora:
  enabled: false
  checkpoint_path: ""
# 多卡配置（仅训练阶段）
multi_gpu:
  # true 时在可用 2+ GPU 上对 WM/IDM/mapper 启用 DataParallel
  enabled: false
  # 逗号分隔的设备 id，留空时自动使用全部可见 GPU（如 CUDA_VISIBLE_DEVICES=0,1）
  device_ids: ""
sigreg:
  # 是否启用 LeWM 论文风格 SIGReg
  enabled: false
  # 正则权重 λ
  weight: 0.01
  # 随机投影数 M
  num_projections: 256
  # 离散积分节点数 T（需与模型训练时一致）
  num_quadrature_points: 17
  # Epps-Pulley 积分区间
  t_min: 0.2
  t_max: 4.0
  # 高斯权重核带宽
  kernel_sigma: 1.0
  # warmup 步数（0 表示不warmup）
  warmup_steps: 1000
encoder_finetune:
  # 是否启用 encoder 轻量微调（Qwen 默认使用 latent adapter）
  enabled: false
  # adapter_only / lora_topk（当前两者均走安全 adapter 路径）
  mode: adapter_only
  # 预留字段：LoRA 顶层可训练 block 数
  trainable_blocks: 0
  # latent adapter 隐层维度
  adapter_hidden_dim: 2048
  # 蒸馏 teacher（当前仅支持 frozen_qwen）
  distill_teacher: frozen_qwen
loss:
  # 物理一致性损失权重
  physics_weight: 0.0
  # teacher-student 蒸馏损失权重
  distill_weight: 0.0
  # 时序平滑损失权重
  temporal_weight: 0.0
operation:
  # 输出根目录
  outputs_root: models
  # 默认行为：仅当 latest run 未完成时自动续训；true 时强制新建 run
  force_new_run: false
  # 阶段标识
  phase: phase2
  # 任务标识
  task: wm_training
flow_matching:
  # 可通过命令行覆盖并映射到 wm.flow_matching.*（便于统一管理）
  variant: rectified_flow
  x0_source: current_latent
  solver: heun
  num_steps: 16
  t_eps: 0.001
  noise_std: 1.0
