# WM 训练阶段配置（phase2）
# 说明：该文件主要控制 batch/优化器/训练模式/多步 rollout 等参数。
# 如需命令行覆盖，可使用：
#   uv run ... pipeline.train.rollout_steps=4
batch_size: 16
epochs: 1
lr: 0.001
# DataLoader 读取样本的并行 worker 数
num_workers: 8
# 预编码 latent 时使用的并行 worker 数
encoder_num_workers: 8
# 预编码 latent 的批大小
encoder_batch_size: 64
# 训练设备（cuda/cpu）
device: cuda
# 训练模式：unsupervised 或 semi_supervised
training_mode: semi_supervised
# 多步自回归预测步数（=1 时退化为单步）
rollout_steps: 4
# 半监督下 IDM loss 的加权系数
semi_supervised_weight: 1.0
# WM 重建损失加权系数
reconstruction_weight: 1.0
# 梯度裁剪上限（L2 norm）
grad_clip_norm: 1.0
# true 时 WM 分支不把梯度反传到 IDM（分离传播）
detach_idm_in_wm: true
# WM 学习率（null 时回退到 lr）
wm_lr: null
# IDM/mapper 学习率（null 时回退到 lr）
idm_lr: null
operation:
  # 输出根目录
  outputs_root: models
  # 阶段标识
  phase: phase2
  # 任务标识
  task: wm_training
