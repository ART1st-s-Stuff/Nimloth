# WM 训练阶段配置（phase2）
# 说明：该文件主要控制 batch/优化器/训练模式/GT校准监督步数等参数。
# 如需命令行覆盖，可使用：
#   uv run ... pipeline.train.temporal_stride=4
lazy_encoding: true
# 分块模式：按 episode 分组编码，支持 encoder 与训练并行
lazy_episode_chunk: true
# 分块模式下，是否等待第一个 episode 编码完成后再启动训练
lazy_wait_first_episode: true
batch_size: 16
epochs: 4
lr: 0.0001
# DataLoader 读取样本的并行 worker 数
num_workers: 8
# 预编码 latent 时使用的并行 worker 数
encoder_num_workers: 8
# 预编码 latent 的批大小
encoder_batch_size: 128
# precompute_wm_latents 使用的 manifest split（对应 dataset.manifests.<split>）
precompute_split: train
# 训练设备（cuda/cpu）
device: cuda
# 两阶段训练入口：
# - stage1_wm_vision: 训练 WM + vision encoder
# - stage2_value_head: 预留占位（当前不执行）
stage: stage1_wm_vision
# 在线联合训练数据源：ai2thor、eb_nav 或 custom
dataset_source: eb_nav
ai2thor:
  # planner LoRA 联训时必须提供非空 prompt；可使用这些字段：
  # scene, episode_id, step_id, move_ahead_distance, delta_yaw, delta_pitch,
  # agent_horizon, target_distance, center_depth_m, action_mode, near_wall,
  # recovery_active, recovery_stage
  prompt_template: |-
    You are an embodied navigation planner in AI2-THOR.
    Given the current egocentric image, produce the latent planning state for world-model prediction.
    Scene: {scene}
    Episode: {episode_id}
    Step: {step_id}
    Motion command: move={move_ahead_distance}, yaw={delta_yaw}, pitch={delta_pitch}.
eb_nav:
  dataset_path: datasets/EB-Nav/eb-nav_dataset_single_step.json
  images_base_dir: datasets/EB-Nav
  reward_cache_path: datasets/EB-Nav/phase2_reward_cache.jsonl
  # 若 max_samples 截断训练集，则使用剩余尾部未训练 sequence 构建 EB-Nav test set。
  use_heldout_tail_as_test: true
custom:
  # JSON/JSONL manifest，支持预切好的 sequence、episode steps 或 flat steps
  manifest_path: ""
  # 相对图像路径的根目录；留空时使用 manifest 所在目录
  images_base_dir: ""
  # planner LoRA 启用时默认要求 prompt/input 非空
  require_prompt: false
# 训练模式：unsupervised、semi_supervised 或 fully_supervised
# fully_supervised: WM 直接使用真实动作训练，不使用 IDM 推断动作
training_mode: fully_supervised
# 每个样本的监督步数（K）：可填单个整数（固定 K）或区间[min, max]（初始化时采样一个固定 K）
# 例如 K=2 时，监督 z_{t+history_len} 与 z_{t+history_len+1}
temporal_stride: 4
# 半监督下 IDM loss 的加权系数
semi_supervised_weight: 1.0
# WM 重建损失加权系数
reconstruction_weight: 1.0
# 负样本动作对比损失：同一历史状态下，真实动作预测应比负动作预测更接近 target latent。
negative_action_contrastive:
  enabled: true
  weight: 0.1
  margin: 0.05
  # one-hot 动作空间中按 action_id 偏移构造确定性负样本；1 表示每个 step 取一个负动作。
  num_negatives: 1
# 梯度裁剪上限（L2 norm）
grad_clip_norm: 5.0
# true 时 WM 分支不把梯度反传到 IDM（分离传播）
detach_idm_in_wm: false
# WM 学习率（null 时回退到 lr）
wm_lr: null
# IDM/mapper 学习率（null 时回退到 lr）
idm_lr: null
# 最大样本数（0 表示不限制，用于快速调试）
max_samples: 0
# test split 最大评估样本数（<=0 表示不限制；AI2-THOR 默认可用 datasets/ai2thor/test）
test_max_samples: 64
# test split batch size（<=0 时使用 batch_size）
test_batch_size: 0
# 每 N 个 epoch 后在 test split 上跑 eval_step（<=0 关闭）
test_every_n_epochs: 1
# 断点续训：填 checkpoint 路径，或 latest 自动选择 models/wm/joint_qwen 下最新 checkpoint
resume_from_checkpoint: ""
# 每 N step 保存训练断点（<=0 关闭周期保存）
save_every_steps: 500
# 仅保留最新 N 个按 step 保存的 checkpoint；<=0 表示不清理。
keep_last_step_checkpoints: 1
# 训练结束后是否保存最终 checkpoint；LLM backbone 全参训练时 checkpoint 很大，可在实验 smoke 中关闭。
save_final_checkpoint: true
# AdamW 权重衰减
weight_decay: 0.01
# 线性学习率 warmup 步数（0 表示关闭）
lr_warmup_steps: 1000
# Cosine Annealing 总步数（0 表示自动推断 = epochs * batches_per_epoch）
# warmup 完成后从 base_lr 沿余弦曲线下降到 min_lr_ratio * base_lr
cos_annealing_steps: 0
# Cosine Annealing 最小学习率比例（最终 lr = base_lr * ratio）
cos_min_lr_ratio: 0.1
# EMA（仅对 WM 主模型）
ema:
  enabled: true
  decay: 0.999
# step 级日志记录间隔（<=0 表示关闭；1 表示每个 step 都记录到 W&B）
log_every_n_steps: 1
# 训练后可视化：在 test split 上采样 rollout 生成轨迹图并上传 wandb
post_visualization_enabled: true
# 训练中每 N step 触发一次可视化并上传（<=0 关闭训练中触发）
post_visualization_every_n_steps: 10
post_visualization_rollouts: 3
post_visualization_steps: 50
# 是否额外可视化 LeWM 内部 encoder（SIGReg 前）空间轨迹
post_visualization_include_sigreg_encoder_space: true
# Qwen visual encoder 训练策略
qwen_encoder:
  # freeze: 加载 planner LoRA 但冻结 Qwen；full: visual 全参数训练；lora: 仅训练 visual LoRA 参数
  train_mode: full
  # Qwen 前向 dtype。auto 会在支持时优先使用 bf16；fp16 容易让 planner hidden state 溢出成 NaN。
  dtype: auto
  # Qwen trainable params 使用独立低学习率，避免和 WM 共用 1e-4 导致 NaN。
  lr: 0.000001
  # 开启 Qwen activation checkpointing，显著降低联合训练显存占用，但会牺牲速度。
  gradient_checkpointing: true
  # DDP + 同一 Qwen 多次 micro-batch forward 时必须用 non-reentrant，避免参数 ready twice。
  gradient_checkpointing_use_reentrant: false
  # true 时 LLM backbone 也参与 joint training；显存/优化难度会明显增加。
  llm_backbone_trainable: false
  # target latent 默认 stop-gradient，避免 encoder 同时追逐 moving target。
  detach_target_latents: true
  # 遇到 NaN/Inf 时直接报出具体张量名和统计。
  fail_on_nonfinite: true
  # joint training 在线抽 planner latent 时，每次送入 Qwen 的图像/文本条数。
  # 调大可提速但更吃显存；OOM 时降到 1/2/4。
  encode_micro_batch_size: 8
  lora:
    r: 8
    alpha: 16
    dropout: 0.05
    # 若为空，将自动探测 visual 模块常见线性层名
    target_modules: []
  kl:
    # teacher-student 的 vision token 级 KL
    enabled: false
    weight: 0.01
    temperature: 1.0
    # 每个 batch 最多抽取多少张图计算 KL，避免显存暴涨
    max_images_per_batch: 8
  ema:
    # 是否为 Qwen visual encoder 维护 EMA
    enabled: false
    decay: 0.999
    # 训练后可视化是否使用 visual EMA 权重
    use_ema_for_eval: true
# Phase 2 前置 planner LoRA adapter
qwen_planner_lora:
  enabled: false
  checkpoint_path: ""
  # true 时 planner language LoRA/token rows 也跟随 WM 联训。
  trainable: false
  # anchor: 不调用 generate，teacher-force 固定 special-token response 抽 latent；
  # dataset: 使用数据集里逐步 CoT/action 构造的 special-token response；
  # generate: 先生成 planner response，再抽 latent（更慢且要求格式稳定）。
  response_mode: anchor
  # generate 模式单次最多生成 token 数；太大会显著增加训练时间和显存。
  max_new_tokens: 64
  anchor_cot: ""
  anchor_action_id: 0
# 多卡配置（仅训练阶段）
multi_gpu:
  # 推荐用 torchrun 启动 DDP：
  #   torchrun --nproc_per_node=4 -m src.train.train_wm_joint ...
  # torchrun 多进程时会自动对 Qwen/WM/IDM/mapper 启用 DDP。
  # true 仅保留旧单进程 DataParallel fallback；它不会并行 Qwen。
  enabled: false
  # 逗号分隔的设备 id，留空时自动使用全部可见 GPU（如 CUDA_VISIBLE_DEVICES=0,1）
  device_ids: ""
  # Qwen LoRA/token rows 可能存在不参与 loss 的参数，DDP 默认开启 unused 参数检测。
  find_unused_parameters: true
sigreg:
  # 是否启用 LeWM 论文风格 SIGReg；null 表示跟随 wm.lewm.sigreg_enabled
  enabled: null
  # 正则权重 λ
  weight: 0.01
  # 随机投影数 M
  num_projections: 256
  # 离散积分节点数 T（需与模型训练时一致）
  num_quadrature_points: 17
  # Epps-Pulley 积分区间
  t_min: 0.2
  t_max: 4.0
  # 高斯权重核带宽
  kernel_sigma: 1.0
  # warmup 步数（0 表示不warmup）
  warmup_steps: 1000
encoder_finetune:
  # 是否启用 encoder 轻量微调（Qwen 默认使用 latent adapter）
  enabled: false
  # adapter_only / lora_topk（当前两者均走安全 adapter 路径）
  mode: adapter_only
  # 预留字段：LoRA 顶层可训练 block 数
  trainable_blocks: 0
  # latent adapter 隐层维度
  adapter_hidden_dim: 2048
  # 蒸馏 teacher（当前仅支持 frozen_qwen）
  distill_teacher: frozen_qwen
loss:
  # 物理一致性损失权重
  physics_weight: 0.0
  # teacher-student 蒸馏损失权重
  distill_weight: 0.0
  # 时序平滑损失权重
  temporal_weight: 0.0
operation:
  # 输出根目录
  outputs_root: models
  # 默认行为：仅当 latest run 未完成时自动续训；true 时强制新建 run
  force_new_run: false
  # 阶段标识
  phase: phase2
  # 任务标识
  task: wm_training
flow_matching:
  # 可通过命令行覆盖并映射到 wm.flow_matching.*（便于统一管理）
  variant: rectified_flow
  x0_source: current_latent
  solver: heun
  num_steps: 16
  t_eps: 0.001
  noise_std: 1.0
