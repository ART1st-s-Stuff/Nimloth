# WM 训练阶段配置（phase2）
# 说明：该文件主要控制 batch/优化器/训练模式/GT校准监督步数等参数。
# 如需命令行覆盖，可使用：
#   uv run ... pipeline.train.temporal_stride=4
lazy_encoding: true
# 分块模式：按 episode 分组编码，支持 encoder 与训练并行
lazy_episode_chunk: true
# 分块模式下，是否等待第一个 episode 编码完成后再启动训练
lazy_wait_first_episode: true
batch_size: 16
epochs: 4
lr: 0.0001
# DataLoader 读取样本的并行 worker 数
num_workers: 8
# 预编码 latent 时使用的并行 worker 数
encoder_num_workers: 8
# 预编码 latent 的批大小
encoder_batch_size: 128
# precompute_wm_latents 使用的 manifest split（对应 dataset.manifests.<split>）
precompute_split: train
# 训练设备（cuda/cpu）
device: cuda
# 训练模式：unsupervised、semi_supervised 或 fully_supervised
# fully_supervised: WM 直接使用真实动作训练，不使用 IDM 推断动作
training_mode: fully_supervised
# 每个样本的监督步数（K）：可填单个整数（固定 K）或区间[min, max]（初始化时采样一个固定 K）
# 例如 K=2 时，监督 z_{t+history_len} 与 z_{t+history_len+1}
temporal_stride: 4
# 半监督下 IDM loss 的加权系数
semi_supervised_weight: 1.0
# WM 重建损失加权系数
reconstruction_weight: 1.0
# 梯度裁剪上限（L2 norm）
grad_clip_norm: 5.0
# true 时 WM 分支不把梯度反传到 IDM（分离传播）
detach_idm_in_wm: false
# WM 学习率（null 时回退到 lr）
wm_lr: null
# IDM/mapper 学习率（null 时回退到 lr）
idm_lr: null
# AdamW 权重衰减
weight_decay: 0.01
# 线性学习率 warmup 步数（0 表示关闭）
lr_warmup_steps: 1000
# Cosine Annealing 总步数（0 表示自动推断 = epochs * batches_per_epoch）
# warmup 完成后从 base_lr 沿余弦曲线下降到 min_lr_ratio * base_lr
cos_annealing_steps: 0
# Cosine Annealing 最小学习率比例（最终 lr = base_lr * ratio）
cos_min_lr_ratio: 0.1
# EMA（仅对 WM 主模型）
ema:
  enabled: true
  decay: 0.999
# step 级日志记录间隔（<=0 表示关闭；例如 10 表示每 10 step 记录一次）
log_every_n_steps: 10
sigreg:
  # 是否启用 LeWM 论文风格 SIGReg
  enabled: true
  # 正则权重 λ
  weight: 0.01
  # 随机投影数 M
  num_projections: 256
  # 离散积分节点数 T（需与模型训练时一致）
  num_quadrature_points: 17
  # Epps-Pulley 积分区间
  t_min: 0.2
  t_max: 4.0
  # 高斯权重核带宽
  kernel_sigma: 1.0
  # warmup 步数（0 表示不warmup）
  warmup_steps: 1000
operation:
  # 输出根目录
  outputs_root: models
  # 默认行为：仅当 latest run 未完成时自动续训；true 时强制新建 run
  force_new_run: false
  # 阶段标识
  phase: phase2
  # 任务标识
  task: wm_training
semantic_align:
  # 训练/导出默认读取的 manifest split（train_semantic_align / export_pm_ready_features）
  split: train
  # eval_semantic_align 默认 manifest split
  eval_split: val
  # export_pm_ready_features 默认 manifest split（可与 split 独立配置）
  export_split: test
  # 对齐训练批大小
  batch_size: 8
  # 训练轮数
  epochs: 1
  # 学习率
  lr: 0.0005
  # DataLoader worker
  num_workers: 0
  # 正样本时序间隔 k
  positive_k: 1
  # 负样本最小时序间隔
  negative_gap: 6
  # 温度系数 tau
  temperature: 0.07
  # 时序一致性损失权重
  temporal_weight: 0.2
  # 是否启用 cot 文本目标字段
  enable_cot_target: false
  # 训练设备
  device: cuda
  # 是否尝试真实 VLM 生成 s_t；false 时使用占位模式
  use_vlm_for_st: true
  # 评估时读取的 projector ckpt（支持 latest 占位路径）
  eval_ckpt_path: models/semantic_align/qwen_vl/latest/semantic_projector.pt
  # 导出 PM-ready 特征条数上限
  export_max_samples: 2000
  operation:
    outputs_root: models
    phase: phase3
    task: semantic_align
flow_matching:
  # 可通过命令行覆盖并映射到 wm.flow_matching.*（便于统一管理）
  variant: rectified_flow
  x0_source: current_latent
  solver: heun
  num_steps: 16
  t_eps: 0.001
  noise_std: 1.0
