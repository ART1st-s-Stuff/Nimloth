# SFT2 — latent WM + Value head (defaults per sft2_exp.md)

init:
  sft1_checkpoint: null
  wm_predictor_checkpoint: null

data:
  train_jsonl: train_all.jsonl
  val_jsonl: val_all.jsonl
  include_failed_rollouts: true

tuning:
  llm_tune: freeze
  vision_tune: full
  vision_ema: true
  vision_ema_decay: 0.999
  lora_r: 64
  lora_alpha: 128

train:
  epochs: 10
  # P2: per-rank batch 2 x grad_accum 4 keeps effective batch 64 on 8 GPUs.
  # Packed-forward (--packed-forward): micro-batch = 1 trajectory (~T steps/rank);
  # tune grad_accum so world * grad_accum * avg_T ≈ 64, or verify loss curves vs legacy.
  batch_size: 2
  grad_accum: 4
  lr_qwen_start: 1.0e-8
  lr_qwen_peak: 5.0e-7
  state_proj_lr: 1.0e-4
  wm_predictor_lr: 3.0e-4
  value_head_lr: 3.0e-4
  train_wm_predictor: true
  max_length: 12000
  max_pixels: 602112
  emb_dim: 128
  # Performance knobs: remote H800 environment has flash_attn installed; keep
  # gradient checkpointing enabled by default for memory safety, but CLI now
  # supports --no-gradient-checkpointing for profiling.
  attn_implementation: flash_attention_2
  gradient_checkpointing: true

loss:
  lambda_wm_start: 0.1
  lambda_wm_end: 1.0
  lambda_ce: 1.0
  lambda_value: 1.0
  value_rank_margin: 0.1
  value_rank_lambda: 1.0
  value_gamma: 1.0

monitor:
  wandb: true
  early_stop_metric: val_success_rate
