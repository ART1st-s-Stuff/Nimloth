# Navigation baseline training config
# VAGEN base_common scale; Nimloth: max_actions_per_step=1, max_turns=20, prompt_format=wm
# ENV_URL_FILE will be substituted by Slurm scripts with a newline-delimited URL file

envs:
  - name: RemoteEnv
    n_envs: 1200
    data_source: navigation_base
    seed: [1, 1200, 1]
    max_turns: 20
    response_length_per_turn: 512
    config:
      url_file: "ENV_URL_FILE"
      timeout: 120
      retries: 6
      eval_set: base_train
      prompt_format: wm
      max_actions_per_step: 1
  - name: RemoteEnv
    n_envs: 1200
    data_source: navigation_common
    seed: [1, 1200, 1]
    max_turns: 20
    response_length_per_turn: 512
    config:
      url_file: "ENV_URL_FILE"
      timeout: 120
      retries: 6
      eval_set: common_sense_train
      prompt_format: wm
      max_actions_per_step: 1
