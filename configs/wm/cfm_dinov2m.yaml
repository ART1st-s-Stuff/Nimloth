# CFM + DINOv2-M 编码器配置
# 典型用于 phase2 的 WM 训练基线。
name: cfm_dinov2m
hidden_dim: 512
latent_dim: 6144
# 连续动作三元组维度：(move, yaw, pitch)
action_dim: 3
# 历史窗口长度
history_len: 4
transformer:
  # WM Transformer 层数
  num_layers: 6
  # WM Transformer 注意力头数
  num_heads: 16
  # Dropout 比例
  dropout: 0.1
inverse_dynamics:
  # IDM 隐藏维度
  hidden_dim: 512
  # IDM 层数
  num_layers: 3
  # IDM 注意力头数
  num_heads: 4
  # IDM Dropout
  dropout: 0.1
encoder:
  # 编码器配置名
  name: cfm_dinov2m
  # DINOv2 主干名
  backbone_name: dinov2_vits14
  # 是否冻结主干（仅训练投影头）
  freeze_backbone: true
  # 输入图像尺寸（编码阶段会 resize）
  image_size: 224
  # 目标 patch 大小（用于将 DINO patch token 重采样为固定网格）
  patch_size: 56
  # 目标 patch token 数（224/56=4 -> 16）
  num_patches: 16
  # token 聚合策略
  token_strategy: patch_tokens
conditioning:
  # 兼容旧字段：ActionConditioning 使用的调制类型（adaln / film）
  mode: adaln
action_injection:
  # action 注入模式：token / film / adaln
  mode: adaln
history_injection:
  # 固定为历史帧 cross-attention 注入
  mode: cross_attention
  # 固定方向：Query=x_t，Key/Value=history
  cross_attention_direction: query_xt_key_history
flow_matching:
  # 真正流匹配训练目标：rectified_flow
  variant: rectified_flow
  # ODE 起点来源：当前帧 latent
  x0_source: current_latent
  # ODE 推理积分器：euler / heun
  solver: heun
  # 推理积分步数
  num_steps: 16
  # 避免严格从 0 开始的时间边界问题
  t_eps: 0.001
  # 保留字段（当 x0_source=current_latent 时不会生效）
  noise_std: 1.0
cfm:
  # 方案1：SIGReg Encoder/Decoder 配置
  # sigreg_enabled 由训练配置中的 sigreg.enabled 控制
  # sigreg_latent_dim: 0  # 设置为 0 表示使用 token_dim；若设置则使用指定的维度
  # sigreg_encoder_hidden_dim: 0  # 设置为 0 表示自动选择；若设置则使用指定的隐藏层维度
  # sigreg_encoder_num_layers: 2  # Encoder/Decoder 的层数
# 可微调 encoder（取消下面注释并注释掉上面的 encoder 部分）
#   name: trainable_dinov2
#   freeze_backbone: false
