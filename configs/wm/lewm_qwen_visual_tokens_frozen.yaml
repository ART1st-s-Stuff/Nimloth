# LeWM + frozen Qwen visual token baseline.
# Unlike lewm_qwen_visual_frozen, this keeps multiple visual tokens so the WM
# can use spatial/token structure instead of a single mean-pooled vector.
defaults:
  - lewm_dinov2m
  - _self_

name: lewm_qwen_visual_tokens_frozen
hidden_dim: 512
latent_dim: 57344
num_patches: 16
token_dim: 3584
action_dim: 8
history_len: 4
transformer:
  num_layers: 6
  num_heads: 16
  dim_head: 64
  mlp_ratio: 4.0
  dropout: 0.1
inverse_dynamics:
  hidden_dim: 512
  num_layers: 3
  num_heads: 4
  dropout: 0.1
encoder:
  name: qwen_llm
  model_name: Qwen/Qwen2.5-VL-7B-Instruct
  enabled: true
  fallback_enabled: false
  use_fallback: false
  use_vision_only: true
  visual_pooling: tokens
  visual_num_tokens: 16
  llm_backbone_trainable: false
  latent_anchor_mode: last_token
  prompt_template: ""
lewm:
  dim_head: 64
  mlp_ratio: 4.0
  emb_dropout: 0.0
  sigreg_knots: 17
  sigreg_num_proj: 256
  ensemble_size: 1
  sigreg_enabled: false
  sigreg_latent_dim: 3584
  reward:
    enabled: false
    weight: 0.0
    loss_type: mse
    hidden_dim: 512
  perceptual:
    enabled: false
    weight: 0.0
    image_recon_weight: 0.0
    backbone: vgg16
    image_size: 128
    use_predicted_latent: true
    decoder_hidden_channels: 128
