# LeWM + DINOv2-M + Qwen2.5-VL 混合编码器配置
# 融合 DINOv2 物理特征 + Qwen-VL 语义特征
name: lewm_dinov2m_qwen25vl_8b
hidden_dim: 512
latent_dim: 6144
action_dim: 3
history_len: 4
transformer:
  num_layers: 6
  num_heads: 16
  dim_head: 64
  mlp_ratio: 4.0
  dropout: 0.1
inverse_dynamics:
  hidden_dim: 512
  num_layers: 3
  num_heads: 4
  dropout: 0.1
encoder:
  name: lewm_dinov2m_qwen25vl_8b
  dino_backbone_name: dinov2_vits14
  qwen_backbone_name: qwen25vl_8b_vision
  freeze_backbone: true
  image_size: 448
  token_strategy: patch_tokens
  num_patches: 16
  aligner:
    type: light_transformer
    hidden_dim: 512
    num_layers: 2
    num_heads: 4
lewm:
  dim_head: 64
  mlp_ratio: 4.0
  emb_dropout: 0.0
  sigreg_knots: 17
  sigreg_num_proj: 256
