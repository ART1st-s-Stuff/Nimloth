# CFM + 可微调 DINOv2-M 编码器配置
# 方案2：图像 encoder 微调 + SIGReg 正则化
# - DINOv2 backbone 可训练
# - SIGReg 作为 encoder 输出的约束
defaults:
  - cfm_dinov2m
  - _self_

name: cfm_trainable_dinov2m
encoder:
  # 方案2：可微调 encoder（区分来源：cfm_trainable）
  name: cfm_trainable_dinov2m
  backbone_name: dinov2_vits14
  freeze_backbone: false  # 允许微调
  image_size: 224
  patch_size: 56
  num_patches: 16
  token_strategy: patch_tokens
cfm:
  # SIGReg 统计量参数（由训练配置中的 sigreg.* 控制）
  sigreg_latent_dim: 0
  sigreg_encoder_hidden_dim: 0
  sigreg_encoder_num_layers: 2
