# CFM + Qwen2.5-VL 视觉编码器（可训练主干）配置
name: cfm_qwen25vl_8b
hidden_dim: 256
latent_dim: 128
action_dim: 3
# 当前配置使用 1 步历史
history_len: 1
encoder:
  # 编码器配置名
  name: cfm_qwen25vl_8b
  # 视觉主干名
  backbone_name: qwen25vl_8b_vision
  # false 表示允许主干参与训练
  freeze_backbone: false
  # 输入图像尺寸
  image_size: 448
  # token 聚合策略
  token_strategy: patch_mean
  reconstruction_loss:
    # 是否启用额外重建损失
    enabled: true
    # 重建损失权重
    weight: 0.1

