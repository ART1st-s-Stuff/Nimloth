# LeWM + Qwen Vision Encoder Joint Training 配置
# 架构：Image → Vision Encoder → vision tokens → LLM backbone (FROZEN) → hidden state
# SIGReg 在 encoded latent 上进行正则化
defaults:
  - lewm_dinov2m
  - _self_

name: lewm_qwen_llm_joint
hidden_dim: 512
# Qwen2.5-VL-7B LLM hidden dim = 3584, 单个 planner special-token latent
latent_dim: 3584
# num_patches=1 表示 latent 是单一的 LLM hidden state（不是多个 patch tokens）
num_patches: 1
token_dim: 3584
action_dim: 8
history_len: 4
transformer:
  num_layers: 6
  num_heads: 16
  dim_head: 64
  mlp_ratio: 4.0
  dropout: 0.1
inverse_dynamics:
  hidden_dim: 512
  num_layers: 3
  num_heads: 4
  dropout: 0.1
encoder:
  name: qwen_llm
  model_name: Qwen/Qwen2.5-VL-7B-Instruct
  enabled: true  # 启用 Qwen 模型
  fallback_enabled: true
  use_fallback: false  # 使用真实模型
  use_vision_only: false  # 通过 LLM backbone 获取 hidden state
  llm_backbone_trainable: false  # LLM backbone 固定不动
  latent_anchor_mode: last_token  # planner LoRA 接入时 train_wm_joint 会切到 planner_special
  prompt_template: ""  # 空字符串表示纯视觉输入
lewm:
  dim_head: 64
  mlp_ratio: 4.0
  emb_dropout: 0.0
  sigreg_knots: 17
  sigreg_num_proj: 256
  # SIGReg 在 encoded latent 上应用
  sigreg_enabled: true
  sigreg_latent_dim: 3584
  reward:
    enabled: true
    weight: 1.0
    loss_type: mse
    hidden_dim: 512
  perceptual:
    enabled: true
    weight: 0.1
    image_recon_weight: 0.1
    backbone: vgg16
    image_size: 128
    use_predicted_latent: true
    decoder_hidden_channels: 128
