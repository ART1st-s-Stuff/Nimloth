# LeWM（Latent Energy World Model）配置（不启用视觉编码器）
# 适用于纯 latent 输入的调试/基线实验
# 参考 lucas-maes/le-wm 的 ARPredictor，使用 AdaLN-Zero + 因果注意力 Transformer
name: lewm
hidden_dim: 256
latent_dim: 128
action_dim: 3
history_len: 4
transformer:
  num_layers: 4
  num_heads: 4
  dim_head: 64
  mlp_ratio: 4.0
  dropout: 0.1
inverse_dynamics:
  hidden_dim: 256
  num_layers: 3
  num_heads: 4
  dropout: 0.1
encoder:
  name: none
lewm:
  dim_head: 64
  mlp_ratio: 4.0
  emb_dropout: 0.0
  # SIGReg 统计量参数
  sigreg_knots: 17
  sigreg_num_proj: 256
  # 方案1：SIGReg Encoder/Decoder 配置
  # sigreg_enabled 由训练配置中的 sigreg.enabled 控制
  # sigreg_latent_dim: 0  # 设置为 0 表示使用 token_dim；若设置为其他值则使用指定的维度
  # sigreg_encoder_hidden_dim: 0  # 设置为 0 表示自动选择；若设置则使用指定的隐藏层维度
  # sigreg_encoder_num_layers: 2  # Encoder/Decoder 的层数
