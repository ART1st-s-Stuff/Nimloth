# 融合 DINOv2 + Qwen2.5-VL 视觉特征的 CFM 配置
# 通过 aligner 对双分支特征做轻量对齐融合。
name: cfm_dinov2m_qwen25vl_8b
hidden_dim: 256
latent_dim: 128
action_dim: 3
# 当前配置使用 1 步历史
history_len: 1
encoder:
  # 编码器配置名
  name: cfm_dinov2m_qwen25vl_8b
  # DINO 分支主干
  dino_backbone_name: dinov2_vits14
  # Qwen-VL 视觉主干
  qwen_backbone_name: qwen25vl_8b_vision
  # 是否冻结视觉主干
  freeze_backbone: true
  # 输入图像尺寸
  image_size: 448
  # token 聚合策略
  token_strategy: patch_mean
  aligner:
    # 对齐器类型
    type: light_transformer
    # 对齐器隐藏维度
    hidden_dim: 256
    # 对齐器层数
    num_layers: 2
    # 对齐器注意力头数
    num_heads: 4

