# RL Joint Training Configuration
# WM + PM + VLM 联合优化配置

# === RL 算法配置 ===
rl:
  # 算法: ppo
  algorithm: ppo

  # === 环境参数 ===
  num_envs: 8
  num_steps: 128
  max_episode_length: 50

  # === 数据源 ===
  manifest_path: datasets/ai2thor/2026-04-22_14-50-39/manifest.latents.cfm_dinov2m.pt
  latent_cache_dir: datasets/ai2thor/2026-04-22_14-50-39/manifest.latents.cfm_dinov2m.pt

  # === PPO 超参数 ===
  gamma: 0.99
  gae_lambda: 0.95
  epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  lr: 3e-4
  max_grad_norm: 0.5
  num_epochs: 10
  mini_batch_size: 64

  # === 模型架构 ===
  hidden_dim: 256
  num_layers: 4
  num_heads: 4
  dropout: 0.1
  action_std_init: 0.5

  # === VLM 语义特征 ===
  use_vlm: false
  semantic_dim: 0

  # === 训练控制 ===
  num_iterations: 1000
  eval_every: 10
  save_every: 50
  wm_freeze_steps: 500

  # === 奖励权重 ===
  wm_reward_weight: 0.2
  semantic_reward_weight: 0.1
  action_penalty_weight: 0.01
  latent_dist_weight: 0.1
  reward_type: combined

  # === WM 联合训练 ===
  wm_update_enabled: false
  wm_update_interval: 10
  wm_lr: 1e-4

  # === 输出 ===
  outputs_root: models/rl_joint
  run_name: rl_joint_default

  # === 设备 ===
  device: cuda

# === 环境参数 ===
env:
  latent_dim: 512
  action_dim: 3
  num_patches: 16
  token_dim: 384
  history_len: 4
  semantic_dim: 0
  max_episode_length: 50

# === WM 配置 ===
wm:
  type: cfm
  latent_dim: 512
  num_patches: 16
  token_dim: 384
  history_len: 4
  hidden_dim: 512
  num_layers: 6
  num_heads: 8
  dropout: 0.1
  action_dim: 3
  ckpt_path: null
  # CFM specific
  conditioning_mode: adaln
  action_input_mode: adaln
  flow_matching_variant: rectified_flow
  solver: heun
  num_integration_steps: 16
  # LeWM specific
  # type: lewm
  # dim_head: 64
  # mlp_ratio: 4.0

# === VLM 配置 ===
vlm:
  enabled: false
  model_name: Qwen/Qwen2-VL-7B-Instruct
  latent_dim: 512
  fallback_enabled: true
  max_new_tokens: 128
  num_patches: 16
  token_strategy: patch_mean
